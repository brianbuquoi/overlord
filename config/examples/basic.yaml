version: "1"

schema_registry:
  - name: intake_input
    version: "v1"
    path: ../../schemas/intake_input_v1.json
  - name: intake_output
    version: "v1"
    path: ../../schemas/intake_output_v1.json
  - name: process_input
    version: "v1"
    path: ../../schemas/process_input_v1.json
  - name: process_output
    version: "v1"
    path: ../../schemas/process_output_v1.json
  - name: validate_input
    version: "v1"
    path: ../../schemas/validate_input_v1.json
  - name: validate_output
    version: "v1"
    path: ../../schemas/validate_output_v1.json

pipelines:
  - name: basic-pipeline
    concurrency: 5
    store: memory
    stages:
      - id: intake
        agent: claude-intake
        input_schema:
          name: intake_input
          version: "v1"
        output_schema:
          name: intake_output
          version: "v1"
        timeout: 30s
        retry:
          max_attempts: 3
          backoff: exponential
          base_delay: 1s
        on_success: process
        on_failure: dead-letter

      - id: process
        agent: claude-process
        input_schema:
          name: process_input
          version: "v1"
        output_schema:
          name: process_output
          version: "v1"
        timeout: 60s
        retry:
          max_attempts: 2
          backoff: linear
          base_delay: 2s
        on_success: validate
        on_failure: dead-letter

      - id: validate
        agent: claude-validate
        input_schema:
          name: validate_input
          version: "v1"
        output_schema:
          name: validate_output
          version: "v1"
        timeout: 15s
        retry:
          max_attempts: 1
          backoff: fixed
          base_delay: 500ms
        on_success: done
        on_failure: process

agents:
  - id: claude-intake
    provider: anthropic
    model: claude-sonnet-4-20250514
    auth:
      api_key_env: ANTHROPIC_API_KEY
    system_prompt: "You are an intake classifier. Categorize and structure the incoming request."
    temperature: 0.1
    max_tokens: 1024
    timeout: 30s

  - id: claude-process
    provider: anthropic
    model: claude-sonnet-4-20250514
    auth:
      api_key_env: ANTHROPIC_API_KEY
    system_prompt: "You are a processing agent. Transform the structured input according to the task requirements."
    temperature: 0.3
    max_tokens: 4096
    timeout: 60s

  - id: claude-validate
    provider: anthropic
    model: claude-haiku-4-5-20251001
    auth:
      api_key_env: ANTHROPIC_API_KEY
    system_prompt: "You are a validation agent. Verify the processed output meets quality requirements."
    temperature: 0.0
    max_tokens: 512
    timeout: 15s

stores:
  memory:
    max_tasks: 10000
