version: "1"

schema_registry:
  - name: intake_input
    version: "v1"
    path: ../../schemas/intake_input_v1.json
  - name: intake_output
    version: "v1"
    path: ../../schemas/intake_output_v1.json
  - name: review_input
    version: "v1"
    path: ../../schemas/review_input_v1.json
  - name: review_output
    version: "v1"
    path: ../../schemas/review_output_v1.json
  - name: review_aggregate
    version: "v1"
    path: ../../schemas/review_aggregate_v1.json
  - name: summarize_input
    version: "v1"
    path: ../../schemas/summarize_input_v1.json
  - name: summarize_output
    version: "v1"
    path: ../../schemas/summarize_output_v1.json

pipelines:
  - name: multi-provider-pipeline
    concurrency: 3
    store: memory
    stages:
      - id: intake
        agent: claude-intake
        input_schema:
          name: intake_input
          version: "v1"
        output_schema:
          name: intake_output
          version: "v1"
        timeout: 30s
        retry:
          max_attempts: 3
          backoff: exponential
          base_delay: 1s
        on_success: multi-review
        on_failure: dead-letter

      - id: multi-review
        fan_out:
          agents:
            - id: claude-reviewer
            - id: gemini-reviewer
            - id: openai-reviewer
          mode: gather
          timeout: 60s
          require: majority
        input_schema:
          name: review_input
          version: "v1"
        output_schema:
          name: review_output
          version: "v1"
        aggregate_schema:
          name: review_aggregate
          version: "v1"
        timeout: 90s
        retry:
          max_attempts: 1
          backoff: fixed
          base_delay: 1s
        on_success: judge
        on_failure: dead-letter

      - id: judge
        agent: claude-judge
        input_schema:
          name: review_aggregate
          version: "v1"
        output_schema:
          name: summarize_output
          version: "v1"
        timeout: 45s
        retry:
          max_attempts: 2
          backoff: exponential
          base_delay: 2s
        on_success: done
        on_failure: dead-letter

agents:
  - id: claude-intake
    provider: anthropic
    model: claude-sonnet-4-20250514
    auth:
      api_key_env: ANTHROPIC_API_KEY
    system_prompt: "You are an intake classifier. Categorize and structure the incoming request."
    temperature: 0.1
    max_tokens: 1024
    timeout: 30s

  - id: claude-reviewer
    provider: anthropic
    model: claude-sonnet-4-20250514
    auth:
      api_key_env: ANTHROPIC_API_KEY
    system_prompt: "You are a code reviewer. Analyze the code changes and provide detailed findings with severity levels."
    temperature: 0.2
    max_tokens: 4096
    timeout: 60s

  - id: gemini-reviewer
    provider: google
    model: gemini-2.0-flash
    auth:
      api_key_env: GEMINI_API_KEY
    system_prompt: "You are a code reviewer. Analyze the code changes and provide detailed findings with severity levels."
    temperature: 0.2
    max_tokens: 4096
    timeout: 60s

  - id: openai-reviewer
    provider: openai
    model: gpt-4o
    auth:
      api_key_env: OPENAI_API_KEY
    system_prompt: "You are a code reviewer. Analyze the code changes and provide detailed findings with severity levels."
    temperature: 0.2
    max_tokens: 4096
    timeout: 60s

  - id: claude-judge
    provider: anthropic
    model: claude-opus-4-5-20250514
    auth:
      api_key_env: ANTHROPIC_API_KEY
    system_prompt: "You are a review judge. Synthesize multiple code review results into a final assessment with an executive summary and actionable recommendations."
    temperature: 0.1
    max_tokens: 2048
    timeout: 45s

stores:
  memory:
    max_tasks: 10000
