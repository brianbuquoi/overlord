version: "1"

schema_registry:
  - name: intake_input
    version: "v1"
    path: ../../schemas/intake_input_v1.json
  - name: intake_output
    version: "v1"
    path: ../../schemas/intake_output_v1.json
  - name: process_input
    version: "v1"
    path: ../../schemas/process_input_v1.json
  - name: process_output
    version: "v1"
    path: ../../schemas/process_output_v1.json
  - name: validate_input
    version: "v1"
    path: ../../schemas/validate_input_v1.json
  - name: validate_output
    version: "v1"
    path: ../../schemas/validate_output_v1.json

pipelines:
  - name: self-hosted-pipeline
    concurrency: 2
    store: memory
    stages:
      - id: intake
        agent: ollama-intake
        input_schema:
          name: intake_input
          version: "v1"
        output_schema:
          name: intake_output
          version: "v1"
        timeout: 60s
        retry:
          max_attempts: 3
          backoff: exponential
          base_delay: 2s
        on_success: process
        on_failure: dead-letter

      - id: process
        agent: ollama-process
        input_schema:
          name: process_input
          version: "v1"
        output_schema:
          name: process_output
          version: "v1"
        timeout: 120s
        retry:
          max_attempts: 2
          backoff: linear
          base_delay: 5s
        on_success: validate
        on_failure: dead-letter

      - id: validate
        agent: ollama-validate
        input_schema:
          name: validate_input
          version: "v1"
        output_schema:
          name: validate_output
          version: "v1"
        timeout: 60s
        retry:
          max_attempts: 1
          backoff: fixed
          base_delay: 1s
        on_success: done
        on_failure: process

agents:
  - id: ollama-intake
    provider: ollama
    model: llama3
    system_prompt: "You are an intake classifier. Categorize and structure the incoming request."
    temperature: 0.1
    max_tokens: 1024
    timeout: 60s

  - id: ollama-process
    provider: ollama
    model: llama3
    system_prompt: "You are a processing agent. Transform the structured input according to the task requirements."
    temperature: 0.3
    max_tokens: 4096
    timeout: 120s

  - id: ollama-validate
    provider: ollama
    model: llama3
    system_prompt: "You are a validation agent. Verify the processed output meets quality requirements."
    temperature: 0.0
    max_tokens: 2048
    timeout: 60s

stores:
  memory:
    max_tasks: 5000
