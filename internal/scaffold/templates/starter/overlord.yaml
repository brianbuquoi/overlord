version: "1"

# Scaffolded by `overlord init`.
#
# This is the simple workflow format. One YAML file, a linear sequence
# of steps, each step a prompt plus a model. Run it locally with
# `overlord run --input-file sample_input.txt`, serve it with
# `overlord serve`, or graduate to the advanced strict format with
# `overlord export --advanced --out ./advanced` when you need fan-out,
# conditional routing, retry budgets, or the other strict-mode
# capabilities.
#
# Out of the box this workflow runs against the built-in `mock`
# provider so you see real multi-step output with zero credentials.
# To swap in a real LLM, change a step's `model:` line (for example,
# `anthropic/claude-sonnet-4-5`, `openai/gpt-4o`,
# `google/gemini-2.5-pro`, or `ollama/llama3`) and remove the
# `fixture:` line for that step. Provider credentials come from
# environment variables — see docs/chain.md for the full list.

workflow:
  id: starter

  input: text

  vars:
    audience: "engineering leaders"

  steps:
    - model: mock/draft
      fixture: fixtures/draft.json
      prompt: |
        You are writing a first draft for {{vars.audience}}.

        Request:
        {{input}}

        Respond with plain prose.

    - model: mock/review
      fixture: fixtures/review.json
      prompt: |
        You are reviewing a draft. Focus on:
        - clarity
        - correctness
        - missing context

        Draft under review:
        {{prev}}

        Respond with plain prose.

# runtime: is optional. `overlord serve` honors the bind / store /
# auth settings declared here. For local-only use the defaults are
# fine — loopback bind, in-memory store, dashboard enabled.
#
# runtime:
#   bind: 127.0.0.1:8080
#   dashboard: true
#   store:
#     type: memory
#   auth:
#     enabled: false
